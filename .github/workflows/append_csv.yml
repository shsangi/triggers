name: Append CSV with Timestamps

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch:        # Manual trigger

jobs:
  append-to-csv:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install pandas pytz
      
      - name: Run Python script
        run: python generate_data.py
      
      - name: Force commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Configure git
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          
          # Pull latest changes FIRST (critical!)
          git pull origin main --rebase
          
          # Add files (even if they haven't changed, this ensures we check)
          git add data_log.csv last_run.txt
          
          # Check if there are actual changes
          if git diff --staged --quiet; then
            echo "No changes detected in files"
            
            # Force a change to last_run.txt to ensure commit happens
            echo "Force update at $(date)" >> last_run.txt
            git add last_run.txt
          fi
          
          # Commit (will always have something now)
          git commit -m "🤖 Auto-update at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          
          # Push with retry
          for i in {1..3}; do
            if git push origin main; then
              echo "✅ Push successful"
              exit 0
            else
              echo "⚠️ Push failed (attempt $i/3), pulling and retrying..."
              git pull origin main --rebase
              sleep 5
            fi
          done
          
          echo "❌ Failed to push after 3 attempts"
          exit 1

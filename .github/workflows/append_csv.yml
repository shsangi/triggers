name: Append CSV with Timestamps

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  append-to-csv:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install pandas pytz
      
      - name: Run Python script
        run: python generate_data.py
      
      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Configure git
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          
          # Add files first (stage changes)
          git add data_log.csv last_run.txt
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          # Commit the changes
          git commit -m "🤖 Auto-update at $(date -u)"
          
          # Now pull with rebase (no unstaged changes since we committed)
          git pull origin main --rebase
          
          # Push with retry
          for i in {1..3}; do
            if git push origin main; then
              echo "✅ Push successful"
              exit 0
            else
              echo "⚠️ Push failed (attempt $i/3), pulling and retrying..."
              git pull origin main --rebase
              sleep 5
            fi
          done
          
          echo "❌ Failed to push after 3 attempts"
          exit 1

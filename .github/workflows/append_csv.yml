name: Append CSV with Timestamps

on:
  schedule:
    - cron: '*/5 * * * *'  # Runs every 5 minutes
  workflow_dispatch:        # Manual trigger

jobs:
  append-to-csv:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install pandas pytz
      
      - name: Run Python script
        run: python generate_data.py
      
      - name: Commit and push with conflict resolution
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Configure git
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          
          # Add files
          git add data_log.csv last_run.txt 2>/dev/null || true
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          # Commit
          git commit -m "🤖 Update CSV #$(date +%s)"
          
          # Try to push with retry and rebase
          max_retries=3
          retry_count=0
          
          while [ $retry_count -lt $max_retries ]; do
            echo "Push attempt $((retry_count+1))/$max_retries"
            
            if git push origin main; then
              echo "✅ Push successful!"
              exit 0
            else
              echo "⚠️ Push failed, pulling latest changes..."
              git pull origin main --rebase
              retry_count=$((retry_count+1))
              
              if [ $retry_count -lt $max_retries ]; then
                echo "Retrying in 5 seconds..."
                sleep 5
              fi
            fi
          done
          
          echo "❌ Failed to push after $max_retries attempts"
          exit 1
